<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    PROL favicon: lightbulb with a spark halo.
    Reads as "moment of insight / learning" at 16×16 and reveals
    the stylised "P" filament when zoomed in (32×32 and up).
    Single brand color (#6366f1) keeps it crisp on light/dark UI.
  -->
  <title>PROL</title>

  <!-- Spark halo: 4 short rays around the bulb. Round caps so they read
       as light flashes at small sizes instead of geometric lines. -->
  <g stroke="#6366f1" stroke-width="4" stroke-linecap="round">
    <line x1="32" y1="2"  x2="32" y2="9" />
    <line x1="9"  y1="14" x2="14" y2="19" />
    <line x1="55" y1="14" x2="50" y2="19" />
    <line x1="2"  y1="32" x2="9"  y2="32" />
    <line x1="55" y1="32" x2="62" y2="32" />
  </g>

  <!-- Bulb glass: dome + neck in one path. Solid fill in the brand
       primary so the silhouette holds together at 16px. -->
  <path
    d="M 32 12
       C 19.5 12 11 22 11 33
       C 11 40 14.5 46 19 49.5
       C 21.5 51.5 22.5 53 22.5 55
       L 41.5 55
       C 41.5 53 42.5 51.5 45 49.5
       C 49.5 46 53 40 53 33
       C 53 22 44.5 12 32 12 Z"
    fill="#6366f1"
  />

  <!-- Filament "P": only legible at 32px+; at 16px it reads as
       a generic filament loop inside the bulb (which is correct). -->
  <path
    d="M 26 26
       L 26 44
       M 26 26
       L 33 26
       Q 39 26 39 32
       Q 39 38 33 38
       L 26 38"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Screw base: two stripes for the thread + the bottom contact.
       Dark indigo so it reads as "metal" against the brand bulb. -->
  <rect x="24" y="55" width="16" height="3.5" rx="1" fill="#4f46e5" />
  <rect x="25" y="59.5" width="14" height="3" rx="1" fill="#4338ca" />
  <rect x="28" y="62" width="8" height="2" rx="1" fill="#312e81" />
</svg>
